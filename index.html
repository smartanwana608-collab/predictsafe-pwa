<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PredictSafe</title>

<link rel="stylesheet" href="styles.css">
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <i class="ri-menu-line"></i>
    <span class="logo-text">PredictSafe</span>
    <i class="ri-notification-3-line"></i>
</div>

<!-- HOME UI -->
<div id="home">

    <div class="card" onclick="openPage('https://www.predictsafe.com/?filter=all-tips')">
        ⚽ Free Predictions
    </div>

    <div class="card" onclick="openPage('https://www.predictsafe.com/previous-wins')">
        🏆 Previous VIP Wins
    </div>

    <div class="card" onclick="openPage('https://www.predictsafe.com/subscriptions')">
        💎 VIP Packages
    </div>

    <div class="card" onclick="openPage('https://www.predictsafe.com/vip')">
        👑 VIP Games
    </div>

    <div class="card" onclick="openPage('https://www.predictsafe.com/login?returnUrl=%2Fcheckout%3Fplan%3Dcorrect-score')">
        🎯 Correct Score
    </div>

    <div class="card" onclick="openTelegram()">
        📲 Join Telegram
    </div>

    <div class="card" onclick="openPage('https://www.predictsafe.com/terms')">
        📄 Terms & Conditions
    </div>

    <div class="card" onclick="openWhatsApp()">
        💬 Chat With Us
    </div>

</div>

<!-- VIEWER -->
<div id="viewer">
    <button onclick="goBack()">← Back</button>
    <iframe id="frame"></iframe>
</div>

<script src="app.js"></script>

</body>
</html>
