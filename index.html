<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PredictSafe</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

<!-- OneSignal -->
<script src="https://cdn.onesignal.com/sdks/OneSignalSDK.js" async=""></script>

</head>

<body>

<!-- SIDE MENU -->
<div id="menu" class="menu">
    <div class="menu-header">PredictSafe</div>

    <div onclick="openPage('https://www.predictsafe.com/?filter=all-tips')">⚽ Free Predictions</div>
    <div onclick="openPage('https://www.predictsafe.com/previous-wins')">🏆 VIP Wins</div>
    <div onclick="openPage('https://www.predictsafe.com/subscriptions')">💎 VIP Packages</div>
    <div onclick="openTelegram()">📲 Telegram</div>
    <div onclick="openWhatsApp()">💬 Contact</div>
</div>

<!-- TOP BAR -->
<div class="topbar">
    <i class="ri-menu-line" onclick="toggleMenu()"></i>
    <span>PredictSafe</span>
    <i class="ri-notification-3-line" onclick="subscribeUser()"></i>
</div>

<!-- INSTALL BANNER -->
<div id="installBanner" class="install-banner">
    Install PredictSafe App
    <button onclick="installApp()">Install</button>
</div>

<!-- HOME -->
<div id="home">

    <div class="card" onclick="openPage('https://www.predictsafe.com/?filter=all-tips')">
        ⚽ Free Predictions
    </div>

    <div class="card" onclick="openPage('https://www.predictsafe.com/previous-wins')">
        🏆 Previous VIP Wins
    </div>

    <div class="card" onclick="openPage('https://www.predictsafe.com/subscriptions')">
        💎 VIP Packages
    </div>

    <div class="card" onclick="openPage('https://www.predictsafe.com/vip')">
        👑 VIP Games
    </div>

    <div class="card" onclick="openPage('https://www.predictsafe.com/login')">
        🎯 Correct Score
    </div>

    <div class="card" onclick="openTelegram()">📲 Join Telegram</div>
    <div class="card" onclick="openWhatsApp()">💬 Chat With Us</div>

</div>

<script src="app.js"></script>

</body>
</html>
